<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive PDF Flipbook</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
</head>

<body>

    <div id="canvas-container">
        <div class="toolbar">
            <button class="btn" onclick="toggleFullScreen()">⛶ Layar Penuh</button>
            <a href="draft.pdf" download="dokumen-saya.pdf" class="btn download-link">⬇ Unduh PDF</a>
        </div>

        <div id="flipbook-viewport"></div>

        <div id="main-loader">Memuat Dokumen...</div>
    </div>

    <script src="main.js"></script>
</body>

</html>
