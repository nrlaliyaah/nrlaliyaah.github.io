<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced PDF Flipbook</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
</head>
<body>

    <div id="canvas-container">
        <div class="toolbar">
            <button class="btn" onclick="changeZoom(0.1)">➕</button>
            <button class="btn" onclick="changeZoom(-0.1)">➖</button>
            
            <div class="separator"></div>

            <input type="text" id="searchInput" placeholder="Cari teks...">
            <button class="btn" onclick="performSearch()">Cari</button>

            <div class="separator"></div>

            <input type="number" id="pageInput" placeholder="Hal..." min="1">
            <button class="btn" onclick="goToPage()">Ke Halaman</button>

            <div class="separator"></div>

            <button class="btn" onclick="toggleFullScreen()">⛶</button>
            <a href="draft.pdf" download class="btn">⬇</a>
        </div>

        <div id="flipbook-viewport"></div>
        <div id="main-loader">Memuat Dokumen...</div>
    </div>

    <script src="main.js"></script>
</body>
</html>
