<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Modul Edukasi Promosi Kesehatan</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
</head>

<body>

    <div id="canvas-container">
        <div id="flipbook-viewport"></div>

        <div id="main-loader">Memuat Dokumen...</div>

        <div class="toolbar">
            <div class="page-controls">
                <input type="number" id="pageInput" placeholder="Hal..." min="1">
                <button class="btn" onclick="goToPage()">Go</button>
            </div>

            <div class="separator"></div>

            <button class="btn" onclick="toggleFullScreen()">⛶</button>
            <a href="modul.pdf" download="dokumen.pdf" class="btn">⬇</a>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
